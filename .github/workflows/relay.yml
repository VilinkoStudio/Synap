name: Relay

on:
  push:
    branches:
      - master
    tags:
      - 'relay-*'
    paths:
      - 'relay/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.dockerignore'
      - '.github/workflows/relay.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'relay/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.dockerignore'
      - '.github/workflows/relay.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: relay-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Relay Image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: relay/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GHCR Image
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/synap-relay" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
