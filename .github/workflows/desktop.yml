name: Desktop

on:
  push:
    branches:
      - master
    tags:
      - '*'
    paths:
      - 'desktop/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'desktop/**'
      - 'core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            exe_suffix: ''
            archive_ext: tar.gz
          - os: macos-14
            platform: macos-arm64
            exe_suffix: ''
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            exe_suffix: '.exe'
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            mesa-common-dev \
            pkg-config

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build desktop app
        run: cargo build --locked --package synap-desktop --bin synap-desktop ${{ startsWith(github.ref, 'refs/tags/') && '--release' || '' }}

      - name: Package release asset (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          set -euo pipefail
          bundle_dir="dist/synap-desktop-${GITHUB_REF_NAME}-${{ matrix.platform }}"
          mkdir -p "$bundle_dir"
          cp "target/release/synap-desktop${{ matrix.exe_suffix }}" "$bundle_dir/"
          if [ -f readme.md ]; then
            cp readme.md "$bundle_dir/"
          fi
          tar -czf "${bundle_dir}.tar.gz" -C dist "$(basename "$bundle_dir")"

      - name: Package release asset (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleDir = "dist/synap-desktop-$env:GITHUB_REF_NAME-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "target/release/synap-desktop${{ matrix.exe_suffix }}" $bundleDir
          if (Test-Path "readme.md") {
            Copy-Item "readme.md" $bundleDir
          }
          Compress-Archive -Path "$bundleDir/*" -DestinationPath "$bundleDir.zip" -Force

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: synap-desktop-${{ matrix.platform }}-release
          path: dist/synap-desktop-${{ github.ref_name }}-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: synap-desktop-*-release
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
