name: Desktop Windows

on:
  push:
    branches:
      - master
    tags:
      - 'desktop-windows-*'
    paths:
      - 'desktop_windows/**'
      - 'core/**'
      - 'coreffi/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop_windows.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'desktop_windows/**'
      - 'core/**'
      - 'coreffi/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/desktop_windows.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: 'true'

jobs:
  build:
    name: Build Desktop Windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Restore NuGet packages
        run: dotnet restore desktop_windows/desktop_windows.sln

      - name: Build desktop app
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: dotnet build desktop_windows/desktop_windows.sln --configuration Debug -p:Platform=x64 --no-restore

      - name: Publish desktop app
        if: startsWith(github.ref, 'refs/tags/')
        run: dotnet publish desktop_windows/desktop_windows.csproj --configuration Release -p:Platform=x64 -r win-x64 --self-contained false --no-restore

      - name: Collect release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $publishDir = "desktop_windows/bin/x64/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          if (-not (Test-Path $publishDir)) {
            throw "Publish output not found: $publishDir"
          }

          $bundleDir = "dist/synap-desktop-windows-$env:GITHUB_REF_NAME-windows-x64"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "$publishDir/*" $bundleDir -Recurse -Force

          if (Test-Path "readme.md") {
            Copy-Item "readme.md" $bundleDir
          }

          Compress-Archive -Path "$bundleDir/*" -DestinationPath "$bundleDir.zip" -Force

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: synap-desktop-windows-release
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: synap-desktop-windows-release
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
